name: アセットパフォーマンスレポートCSV自動取得

on:
  workflow_dispatch: {} # 手動実行 or 外部(GAS)からのAPI呼び出しのみで起動

jobs:
  export-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージのインストール
        run: npm install

      - name: Playwright ブラウザのインストール
        run: npx playwright install --with-deps chromium

      - name: ログインセッション(auth.json)を復元
        run: echo "${{ secrets.PLAYWRIGHT_STORAGE_STATE_B64 }}" | base64 --decode > auth.json

      - name: レポートCSVエクスポートスクリプトを実行
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          GAS_SHARED_SECRET: ${{ secrets.GAS_SHARED_SECRET }}
          STORAGE_STATE_PATH: auth.json
        run: node export_asset_reports.js

      - name: auth.jsonを後片付け(念のため)
        if: always()
        run: rm -f auth.json
